<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Change Password</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f6fb;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .card {
            width: 100%;
            max-width: 440px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.08);
            padding: 40px;
            box-sizing: border-box;
        }

        .card h1 {
            margin: 0 0 6px;
            font-size: 28px;
            text-align: center;
            color: #1a1a1a;
        }

        .subtitle {
            text-align: center;
            color: #5f6c84;
            font-size: 14px;
            margin: 0 0 28px;
        }

        .form-group {
            margin-bottom: 22px;
        }

        label {
            display: block;
            font-size: 14px;
            margin-bottom: 8px;
            color: #2c3e50;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 13px 15px;
            border: 1px solid #d8dbe9;
            border-radius: 10px;
            font-size: 15px;
            box-sizing: border-box;
            background: #f8f9ff;
            color: #1a1a1a;
        }

        input::placeholder {
            color: #8a94a6;
        }

        .btn {
            width: 100%;
            border: none;
            border-radius: 10px;
            background: #d60000;
            color: white;
            font-size: 16px;
            font-weight: bold;
            padding: 15px;
            cursor: pointer;
            margin-top: 4px;
        }

        .btn:hover {
            background: #b30000;
        }

        .back-link {
            display: block;
            margin-top: 18px;
            text-align: center;
            font-size: 14px;
            color: #5f6c84;
            text-decoration: none;
        }

        .back-link:hover {
            text-decoration: underline;
        }

        .alert {
            padding: 14px 18px;
            border: 1px solid transparent;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            position: relative;
        }

        .alert-success {
            background: #d4edda;
            border-color: #c3e6cb;
            color: #155724;
        }

        .alert-danger {
            background: #f8d7da;
            border-color: #f5c6cb;
            color: #721c24;
        }

        .alert-dismissible .close {
            position: absolute;
            top: 10px;
            right: 14px;
            background: transparent;
            border: none;
            font-size: 20px;
            cursor: pointer;
            color: inherit;
        }
    </style>
</head>
<body>
    <div class="card">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert {% if category == 'error' %}alert-danger{% else %}alert-success{% endif %} alert-dismissible">
                        {{ message }}
                        <button class="close" type="button">&times;</button>
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <h1>Change Password</h1>
        <p class="subtitle">Logged in as {{ current_user.email }}</p>

        <form method="POST">
            <div class="form-group">
                <label for="currentPassword">Current Password</label>
                <input type="password" id="currentPassword" name="currentPassword" placeholder="Enter current password" required>
            </div>
            <div class="form-group">
                <label for="newPassword">New Password</label>
                <input type="password" id="newPassword" name="newPassword" placeholder="At least 9 characters" required minlength="9">
            </div>
            <div class="form-group">
                <label for="confirmPassword">Confirm New Password</label>
                <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Repeat new password" required>
            </div>
            <button class="btn" type="submit">Update Password</button>
        </form>

        <a class="back-link" href="{{ url_for('views.home') }}">&larr; Back to Home</a>
    </div>

    <script>
        document.addEventListener('click', function (e) {
            if (e.target.classList.contains('close')) {
                e.target.closest('.alert').style.display = 'none';
            }
        });
    </script>
</body>
</html>
